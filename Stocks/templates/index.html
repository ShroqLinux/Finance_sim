<!DOCTYPE html>
<html>
<head>
    <title>Finance Simulator Pro</title>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; max-width: 800px; margin: 40px auto; background: #f4f7f6; color: #2d3436; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: transform 0.1s; }
        .btn-blue { background: #0984e3; color: white; width: 100%; }
        .btn-green { background: #00b894; color: white; }
        .btn-red { background: #d63031; color: white; }
        .alert { background: #ffeaa7; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 15px; border: 1px solid #fdcb6e; }
        .pos { color: #00b894; }
        .neg { color: #d63031; }
        input { padding: 10px; border: 1px solid #dfe6e9; border-radius: 6px; width: 120px; margin-top: 5px; }
        #modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; z-index:100; }
        .modal { background: white; padding: 40px; border-radius: 20px; max-width: 500px; width: 90%; text-align: center; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; text-align: left; }
    </style>
</head>
<body>

<div id="setup" class="card">
    <h1>Finance & Market Sim</h1>
    <div class="grid">
        <div>
            <label>Ticker Symbol</label><br><input type="text" id="symbol" value="SPY"><br><br>
            <label>Starting Invest Cash</label><br><input type="number" id="start_cash" value="10000">
        </div>
        <div>
            <label>Monthly Salary ($)</label><br><input type="number" id="salary" value="4500"><br><br>
            <label>Fixed Expenses ($)</label><br><input type="number" id="expenses" value="2200">
        </div>
    </div>
    <button class="btn btn-blue" style="margin-top:30px" onclick="startGame()">Start Life Simulation</button>
</div>

<div id="game" style="display:none;">
    <div id="event_alert" class="alert" style="display:none;"></div>
    <div class="card">
        <h2 id="current_date" style="margin-top:0">Date</h2>
        <p id="headline" style="font-style: italic; color: #636e72; margin-bottom: 20px;">---</p>
        <div class="grid">
            <div>
                <small>Checking Account</small><br>
                <strong id="checking_cash" style="font-size:1.4em">$0</strong><br>
                <small style="color:#636e72">Var. Expenses: -$<span id="last_var_expense">0</span></small>
            </div>
            <div>
                <small>Investing Cash</small><br>
                <strong id="investing_cash" style="font-size:1.4em">$0</strong>
            </div>
            <div>
                <small>Stock Price</small><br>
                <strong id="price" style="font-size:1.4em">$0</strong> <span id="pct_change">0%</span> 
            </div>
            <div>
                <small>Portfolio Value</small><br>
                <strong id="holdings_value" style="font-size:1.4em">$0</strong><br>
                <small id="holdings_count">0 shares</small>
            </div>
        </div>
        <hr style="border:0; border-top:1px solid #eee; margin:20px 0">
        <div style="text-align:right">
            <small>Total Net Worth</small><br>
            <strong id="net_worth" style="font-size:2em; color:#0984e3">$0</strong>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Trade</h3>
            <input type="number" id="trade_amount" value="5"><br><br>
            <button class="btn btn-green" onclick="trade('buy')">Buy</button>
            <button class="btn btn-red" onclick="trade('sell')">Sell</button>
        </div>
        <div class="card">
            <h3>Transfer</h3>
            <input type="number" id="trans_amount" value="1000"><br><br>
            <button class="btn" style="background:#b2bec3" onclick="transferMoney(1)">Check ➔ Invest</button>
            <button class="btn" style="background:#b2bec3" onclick="transferMoney(-1)">Invest ➔ Check</button>
        </div>
    </div>
    <button class="btn btn-blue" style="font-size:1.2em" onclick="nextTurn()">Advance to Next Month ➔</button>
</div>

<div id="modal-overlay">
    <div class="modal">
        <h2 id="report-title">Performance Report</h2>
        <div class="report-grid">
            <div><small>Total Earned</small><br><strong id="rep-earned">$0</strong></div>
            <div><small>Total Spent</small><br><strong id="rep-spent">$0</strong></div>
            <div><small>Savings Rate</small><br><strong id="rep-savings">0%</strong></div>
            <div><small>Market ROI (Total)</small><br><strong id="rep-roi">0%</strong></div>
        </div>
        <button class="btn btn-blue" onclick="closeModal()">Back to Simulation</button>
    </div>
</div>

<script>
    let lastReportShown = -1; 

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    async function updateUI(data) {
        if (data.error) { alert(data.error); return; }
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game').style.display = 'block';

        if (data.event_message) {
            document.getElementById('event_alert').innerText = data.event_message;
            document.getElementById('event_alert').style.display = 'block';
        } else {
            document.getElementById('event_alert').style.display = 'none';
        }

        document.getElementById('current_date').innerText = data.date;
        document.getElementById('headline').innerText = data.headline;
        document.getElementById('price').innerText = "$" + data.price;
        document.getElementById('investing_cash').innerText = "$" + data.investing_cash.toLocaleString();
        document.getElementById('checking_cash').innerText = "$" + data.checking_cash.toLocaleString();
        document.getElementById('holdings_value').innerText = "$" + data.holdings_value.toLocaleString();
        document.getElementById('holdings_count').innerText = data.holdings + " shares";
        document.getElementById('net_worth').innerText = "$" + data.net_worth.toLocaleString();
        document.getElementById('last_var_expense').innerText = data.last_var_expense;

        const pctEl = document.getElementById('pct_change');
        pctEl.innerText = (data.pct_change > 0 ? "+" : "") + data.pct_change + "%";
        pctEl.className = data.pct_change >= 0 ? 'pos' : 'neg';

        if (data.report && data.report.show && lastReportShown !== data.step) {
            lastReportShown = data.step; 
            document.getElementById('report-title').innerText = (data.step % 12 === 0) ? "Year-End Summary" : "6-Month Progress Report";
            document.getElementById('rep-earned').innerText = "$" + data.report.earned.toLocaleString();
            document.getElementById('rep-spent').innerText = "$" + data.report.spent.toLocaleString();
            document.getElementById('rep-savings').innerText = data.report.savings_rate + "%";
            document.getElementById('rep-roi').innerText = data.report.market_roi + "%";
            document.getElementById('modal-overlay').style.display = 'flex';
        }
    }

    async function startGame() {
        const res = await fetch('/init', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                symbol: document.getElementById('symbol').value,
                cash: document.getElementById('start_cash').value,
                salary: document.getElementById('salary').value,
                expenses: document.getElementById('expenses').value
            })
        });
        updateUI(await res.json());
    }

    async function nextTurn() {
        const res = await fetch('/next', { method: 'POST' });
        updateUI(await res.json());
    }

    async function trade(action) {
        const res = await fetch('/trade', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ action, amount: document.getElementById('trade_amount').value })
        });
        updateUI(await res.json());
    }

    async function transferMoney(dir) {
        const res = await fetch('/transfer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ amount: document.getElementById('trans_amount').value * dir })
        });
        updateUI(await res.json());
    }
</script>
</body>
</html>
